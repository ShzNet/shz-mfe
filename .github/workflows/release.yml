name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: src

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and changelog
        id: version
        run: |
          BEFORE_HEAD=$(git rev-parse HEAD)
          CURRENT_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
          echo "before_head=$BEFORE_HEAD"
          echo "current_tag=${CURRENT_TAG:-<none>}"
          git log --oneline --decorate --max-count=8
          if [ -n "$CURRENT_TAG" ]; then
            echo "commits_since_${CURRENT_TAG}:"
            git log --format='%h %s' "${CURRENT_TAG}..HEAD" || true
          fi
          set +e
          OUTPUT=$(pnpm nx release --skip-publish --verbose 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"

          if [ $STATUS -ne 0 ]; then
            exit $STATUS
          fi

          AFTER_HEAD=$(git rev-parse HEAD)
          echo "after_head=$AFTER_HEAD"
          if [ "$BEFORE_HEAD" != "$AFTER_HEAD" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NX_NO_CLOUD: true

      - name: Push release commit and tags
        if: steps.version.outputs.changed == 'true'
        run: git push --follow-tags origin main
